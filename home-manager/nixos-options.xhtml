<?xml version="1.0" encoding="utf-8" standalone="no"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Redirecting to https://nixos.github.io/home-manager/</title>
    <meta charset="utf-8" />

    <link rel="canonical" href="https://nixos.github.io/home-manager/nixos-options.xhtml" />
    <script>
        window.onload = function () {
            if (window.location.href.includes("nix-community.github.io/home-manager")) {
                window.location.href = window.location.href.replace(
                    "nix-community.github.io/home-manager",
                    "nixos.github.io/home-manager"
                );
            }
        }
    </script>
</head>

<body id="body" style="text-align: center">
    <noscript>
      <p>This page has moved to <a href="https://nixos.github.io/home-manager/nixos-options.xhtml">https://nixos.github.io/home-manager/nixos-options.xhtml</a>.</p>
      <p>Enable JavaScript for automatic redirection of the complete URL</p>
    </noscript>
</body>
</html>
