<!DOCTYPE html>
<html>
<head>
    <title>Redirecting to https://nixos.github.io/home-manager/</title>
    <meta charset="utf-8" />

    <link rel="canonical" href="https://nixos.github.io/home-manager/" />
    <script>
        window.onload = function () {
            if (window.location.href.includes("nix-community.github.io/home-manager")) {
                window.location.href = window.location.href.replace(
                    "nix-community.github.io/home-manager",
                    "nixos.github.io/home-manager"
                );
            }
        }
    </script>
</head>
<body id="body" style="text-align: center">
    <noscript>
      <p>This page has moved to <a href="https://nixos.github.io/home-manager/">https://nixos.github.io/home-manager/</a>.</p>
      <p>Enable JavaScript for automatic redirection of the complete URL</p>
    </noscript>
</body>
</html>
